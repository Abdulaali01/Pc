<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تقرير صور</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.min.js"></script>

<style>
body{margin:0;background:#eee;font-family:Tahoma}
.topbar{background:#111;color:#fff;padding:8px;display:flex;gap:10px}
.topbar button{padding:6px 12px;cursor:pointer}
.page{width:210mm;height:297mm;border:1px solid #000;padding:10mm;background:#fff;margin:10mm auto}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5mm}
.img-box{border:1px solid #000;height:60mm;position:relative}
.img-box img{width:100%;height:100%;object-fit:contain}
.img-box.selected{outline:4px solid #22c55e}
.num{position:absolute;top:2mm;right:2mm;background:#000;color:#fff;padding:2mm 3mm}
.add{position:absolute;bottom:2mm;left:2mm;width:10mm;height:10mm;border-radius:50%;background:#2563eb;color:#fff;text-align:center;line-height:10mm;cursor:pointer}
.edit{position:absolute;bottom:2mm;right:2mm;background:#16a34a;color:#fff;padding:2mm 4mm;font-size:12px;cursor:pointer}
.note-editor{position:absolute;inset:0;background:#fff;display:none;flex-direction:column;padding:4mm}
.note-editor textarea{flex:1}
</style>
</head>

<body>

<div class="topbar">
<button onclick="enableSelect()">🔗 ربط التقرير</button>
<button onclick="printPDF()">🖨️ PDF</button>
<button onclick="exportExcel()">📊 Excel</button>
</div>

<div class="page"><div class="grid" id="grid"></div></div>

<script>
let dataStore = JSON.parse(localStorage.getItem("reportData")||"{}");

const grid=document.getElementById("grid");
let selected=[];

for(let i=1;i<=12;i++){
grid.innerHTML+=`
<div class="img-box" id="box${i}" onclick="toggle(${i})">
<div class="num">${i}</div>
<div class="add" onclick="openFile(event,${i})">+</div>
<div class="edit" onclick="openEditor(event,${i})">✏️</div>

<div class="note-editor" id="editor${i}">
<textarea id="note${i}"></textarea>
<button onclick="saveNote(${i})">حفظ</button>
</div>

<input type="file" accept="image/*" onchange="loadImg(${i},this)">
</div>`;
}

function saveStorage(){
localStorage.setItem("reportData",JSON.stringify(dataStore));
}

/* تحميل الصورة */
function loadImg(i,input){
const file=input.files[0];
if(!file) return;

navigator.geolocation.getCurrentPosition(pos=>{
const lat=pos.coords.latitude.toFixed(6);
const lng=pos.coords.longitude.toFixed(6);
const date=new Date().toLocaleString();

const reader=new FileReader();
reader.onload=e=>{
const img=new Image();
img.onload=()=>{
const c=document.createElement("canvas");
c.width=img.width;
c.height=img.height;
const ctx=c.getContext("2d");

ctx.drawImage(img,0,0);
ctx.fillStyle="black";
ctx.fillRect(0,c.height-200,c.width,200);

ctx.fillStyle="#fff";
ctx.font="bold 50px Arial";
ctx.fillText(`LAT:${lat}`,20,c.height-120);
ctx.fillText(`LNG:${lng}`,20,c.height-70);
ctx.fillText(date,20,c.height-20);

const base64=c.toDataURL("image/jpeg");

dataStore[i]={lat,lng,date,img:base64,note:dataStore[i]?.note||""};
saveStorage();

renderBox(i);
}
img.src=e.target.result;
}
reader.readAsDataURL(file);
});
}

/* عرض */
function renderBox(i){
const box=document.getElementById("box"+i);
box.querySelectorAll("img").forEach(x=>x.remove());
if(dataStore[i]){
const img=document.createElement("img");
img.src=dataStore[i].img;
box.appendChild(img);
}
}

/* تحميل من التخزين */
for(let i=1;i<=12;i++) renderBox(i);

/* ملاحظات */
function openEditor(e,i){
e.stopPropagation();
document.getElementById("editor"+i).style.display="flex";
document.getElementById("note"+i).value=dataStore[i]?.note||"";
}
function saveNote(i){
dataStore[i].note=document.getElementById("note"+i).value;
saveStorage();
document.getElementById("editor"+i).style.display="none";
}

/* اختيار */
function enableSelect(){selected=[];}
function toggle(i){
if(selected.includes(i)) selected=selected.filter(x=>x!=i);
else selected.push(i);
}

/* PDF */
async function printPDF(){
const {jsPDF}=window.jspdf;
const pdf=new jsPDF();
let y=20;

for(let i of selected){
const d=dataStore[i];
if(!d) continue;

pdf.addImage(d.img,"JPEG",10,y,80,60);
pdf.text(d.note||"",100,y+10);
y+=70;
}
pdf.save("report.pdf");
}

/* Excel */
function exportExcel(){
let rows=[["LAT","LNG","DATE","NOTE","IMAGE"]];
let images=[];

let idx=1;
for(let i in dataStore){
let d=dataStore[i];
rows.push([d.lat,d.lng,d.date,d.note,""]);

images.push({
name:"img"+idx,
data:d.img,
opts:{base64:true},
position:{type:"twoCellAnchor",from:{col:4,row:idx},to:{col:5,row:idx+1}}
});
idx++;
}

const ws=XLSX.utils.aoa_to_sheet(rows);
ws["!images"]=images;

const wb=XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb,ws,"Report");

XLSX.writeFile(wb,"report.xlsx");
}
</script>

</body>
</html>
