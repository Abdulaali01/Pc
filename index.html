<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تقرير صور مخفي</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{margin:0;background:#eee;font-family:Tahoma,Arial}
.topbar{background:#111;color:#fff;padding:10px;display:flex;gap:10px}
.topbar button{padding:8px 14px;border:none;border-radius:6px;cursor:pointer}

.page{width:210mm;min-height:297mm;background:#fff;margin:10mm auto;padding:10mm;border:1px solid #000}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5mm}

.box{height:60mm;border:1px solid #000;position:relative;background:#fafafa}
.num{position:absolute;top:2mm;right:2mm;background:#000;color:#fff;padding:2mm 3mm}

.add{position:absolute;bottom:2mm;left:2mm;width:10mm;height:10mm;border-radius:50%;background:#2563eb;color:#fff;text-align:center;line-height:10mm;cursor:pointer}
.edit{position:absolute;bottom:2mm;right:2mm;background:#16a34a;color:#fff;padding:2mm 4mm;font-size:12px;cursor:pointer}

.status{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#666}

.picker{position:absolute;bottom:14mm;left:2mm;background:#fff;border:1px solid #000;display:none}
.picker button{display:block;width:100%;border:none;padding:6px;cursor:pointer}

.note-editor{position:absolute;inset:0;background:#fff;display:none;flex-direction:column;padding:10px}
.note-editor textarea{flex:1}
</style>
</head>

<body>

<div class="topbar">
<button onclick="exportPDF()">🖨️ PDF</button>
<button onclick="exportExcel()">📊 Excel</button>
<button onclick="clearAll()">🗑️ مسح</button>
</div>

<div class="page">
<div class="grid" id="grid"></div>
</div>

<script>

const STORAGE="report_data_full";
let data=JSON.parse(localStorage.getItem(STORAGE)||"{}");
const grid=document.getElementById("grid");

/* إنشاء */
for(let i=1;i<=12;i++){
grid.innerHTML+=`
<div class="box">
<div class="num">${i}</div>
<div class="status" id="s${i}">${data[i]?"تم الحفظ":"فارغ"}</div>

<div class="add" onclick="pick(event,${i})">+</div>
<div class="edit" onclick="edit(event,${i})">✏️</div>

<div class="picker" id="p${i}">
<button onclick="file(${i},0)">كاميرا</button>
<button onclick="file(${i},1)">استديو</button>
</div>

<div class="note-editor" id="n${i}">
<textarea id="t${i}"></textarea>
<button onclick="saveNote(${i})">حفظ</button>
</div>

<input id="c${i}" type="file" accept="image/*" capture onchange="img(${i},this)">
<input id="g${i}" type="file" accept="image/*" onchange="img(${i},this)">
</div>`;
}

/* حفظ */
function save(){localStorage.setItem(STORAGE,JSON.stringify(data))}

/* اختيار */
function pick(e,i){
e.stopPropagation();
document.querySelectorAll(".picker").forEach(p=>p.style.display="none");
document.getElementById("p"+i).style.display="block";
}
function file(i,n){
document.getElementById("p"+i).style.display="none";
(n==0?c:g)[i].click();
}

/* ملاحظات */
function edit(e,i){
e.stopPropagation();
document.getElementById("n"+i).style.display="flex";
document.getElementById("t"+i).value=data[i]?.note||"";
}
function saveNote(i){
if(!data[i])data[i]={};
data[i].note=document.getElementById("t"+i).value;
save();
document.getElementById("n"+i).style.display="none";
}

/* صورة */
function img(i,input){
const f=input.files[0]; if(!f)return;

navigator.geolocation.getCurrentPosition(p=>{
const lat=p.coords.latitude.toFixed(6);
const lng=p.coords.longitude.toFixed(6);
const date=new Date().toLocaleString();

const r=new FileReader();
r.onload=e=>{
const im=new Image();
im.onload=()=>{
const c=document.createElement("canvas");
c.width=im.width; c.height=im.height;
const x=c.getContext("2d");

x.drawImage(im,0,0);

/* خلفية */
const h=180;
x.fillStyle="rgba(0,0,0,0.8)";
x.fillRect(0,c.height-h,c.width,h);

/* نص واضح */
x.fillStyle="#fff";
const pad=30;
const y=c.height-h+60;

x.font="bold 44px Arial";
x.fillText("LAT: "+lat,pad,y);

x.fillText("LNG: "+lng,pad,y+50);

x.font="bold 32px Arial";
x.fillText(date,pad,y+100);

data[i]={lat,lng,date,img:c.toDataURL(),note:data[i]?.note||""};
save();

document.getElementById("s"+i).innerText="تم الحفظ";
}
im.src=e.target.result;
}
r.readAsDataURL(f);
});
}

/* PDF كامل */
async function exportPDF(){
const {jsPDF}=window.jspdf;
const pdf=new jsPDF("p","mm","a4");

let y=20;
for(let i in data){
let d=data[i];

pdf.addImage(d.img,"JPEG",10,y,80,50);
pdf.text(d.note||"",100,y+10);

y+=60;
if(y>260){
pdf.addPage();
y=20;
}
}

pdf.save("report.pdf");
}

/* Excel مضبوط */
function exportExcel(){
let rows=[];

for(let i in data){
let d=data[i];
rows.push(`
<tr>
<td>${d.lat}</td>
<td>${d.lng}</td>
<td>${d.date}</td>
<td>${d.note||""}</td>
<td><img src="${d.img}" width="120"></td>
</tr>`);
}

if(!rows.length){alert("لا يوجد بيانات");return;}

let html=`
<html><head><meta charset="UTF-8"></head><body>
<table border="1">
<tr><th>LAT</th><th>LNG</th><th>DATE</th><th>NOTE</th><th>IMAGE</th></tr>
${rows.join("")}
</table></body></html>
`;

const blob=new Blob(['\ufeff'+html],{
type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
});

const a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="report.xlsx";
a.click();
}

/* مسح */
function clearAll(){
if(confirm("مسح؟")){
data={};
save();
location.reload();
}
}

</script>
</body>
</html>
