<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>تقرير صور A4</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  margin:0;
  background:#eee;
  font-family:Tahoma, Arial, sans-serif
}

/* شريط علوي */
.topbar{
  background:#111;
  color:#fff;
  padding:8px;
  display:flex;
  gap:10px;
  flex-wrap:wrap
}
.topbar button{
  padding:6px 12px;
  cursor:pointer;
  border:none;
  border-radius:6px
}

/* الصفحة */
.page{
  width:210mm;
  min-height:297mm;
  border:1px solid #000;
  padding:10mm;
  background:#fff;
  margin:10mm auto
}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:5mm
}

/* الصورة */
.img-box{
  border:1px solid #000;
  height:60mm;
  position:relative;
  overflow:hidden;
  background:#fafafa
}
.img-box img{
  width:100%;
  height:100%;
  object-fit:contain
}
.img-box.selected{
  outline:4px solid #22c55e
}

/* رقم الصورة */
.num{
  position:absolute;
  top:2mm;
  right:2mm;
  background:#000;
  color:#fff;
  padding:2mm 3mm;
  display:block;
  z-index:5
}

/* زر الإضافة */
.add{
  position:absolute;
  bottom:2mm;
  left:2mm;
  width:10mm;
  height:10mm;
  border-radius:50%;
  background:#2563eb;
  color:#fff;
  text-align:center;
  line-height:10mm;
  cursor:pointer;
  z-index:5
}

/* زر التحرير */
.edit{
  position:absolute;
  bottom:2mm;
  right:2mm;
  background:#16a34a;
  color:#fff;
  padding:2mm 4mm;
  font-size:12px;
  cursor:pointer;
  z-index:5
}

/* محرر الملاحظة */
.note-editor{
  position:absolute;
  inset:0;
  background:#fff;
  display:none;
  flex-direction:column;
  padding:4mm;
  z-index:20
}
.note-editor textarea{
  flex:1;
  resize:none;
  font-family:Tahoma;
  font-size:14px;
  line-height:1.6
}
.note-editor button{
  margin-top:4mm;
  padding:8px;
  cursor:pointer
}

/* اختيار مصدر */
.picker{
  position:absolute;
  bottom:14mm;
  left:2mm;
  background:#fff;
  border:1px solid #000;
  display:none;
  z-index:15
}
.picker button{
  display:block;
  width:100%;
  border:none;
  padding:8px 12px;
  cursor:pointer;
  background:#fff
}
.picker button:hover{
  background:#f3f4f6
}

input{
  display:none
}
</style>
</head>

<body>

<div class="topbar">
  <button onclick="enableSelect()">🔗 ربط التقرير</button>
  <button onclick="printPDF()">🖨️ طباعة التقرير</button>
  <button onclick="exportExcel()">📊 تصدير Excel</button>
</div>

<div class="page">
  <div class="grid" id="grid"></div>
</div>

<script>
const grid = document.getElementById("grid");
let selectMode = false;
let selected = [];
const storageKey = "report_photos_data_v1";
let dataStore = JSON.parse(localStorage.getItem(storageKey) || "{}");

/* إنشاء 12 خانات */
for(let i=1;i<=12;i++){
  grid.innerHTML += `
  <div class="img-box" id="box${i}" onclick="toggle(${i})">
    <div class="num">${i}</div>
    <div class="add" onclick="openPicker(event,${i})">+</div>
    <div class="edit" onclick="openEditor(event,${i})">✏️ تحرير</div>

    <div class="note-editor" id="editor${i}">
      <textarea id="note${i}" placeholder="اكتب الملاحظة هنا..."></textarea>
      <button onclick="saveNote(${i})">💾 حفظ</button>
    </div>

    <div class="picker" id="picker${i}">
      <button onclick="openFile(${i},0)">📷 كاميرا</button>
      <button onclick="openFile(${i},1)">🖼️ استديو</button>
    </div>

    <input type="file" accept="image/*" capture="environment" onchange="loadImg(${i},this)">
    <input type="file" accept="image/*" onchange="loadImg(${i},this)">
  </div>`;
}

/* حفظ بالمتصفح */
function saveStorage(){
  localStorage.setItem(storageKey, JSON.stringify(dataStore));
}

/* تحميل المخزن عند الفتح */
function restoreBoxes(){
  for(let i=1;i<=12;i++){
    const box = document.getElementById("box"+i);
    box.querySelectorAll("img").forEach(x=>x.remove());

    if(dataStore[i] && dataStore[i].img){
      const img = document.createElement("img");
      img.src = dataStore[i].img;
      box.appendChild(img);
    }
  }
}
restoreBoxes();

/* الربط */
function enableSelect(){
  selectMode = true;
  selected = [];
  document.querySelectorAll(".img-box").forEach(b=>b.classList.remove("selected"));
  alert("اختر الصور ثم اطبع التقرير");
}

function toggle(i){
  if(!selectMode) return;
  const box = document.getElementById("box"+i);
  box.classList.toggle("selected");

  if(box.classList.contains("selected")){
    if(!selected.includes(i)) selected.push(i);
  }else{
    selected = selected.filter(x=>x!==i);
  }
}

/* إغلاق كل القوائم */
function hideAllPickers(){
  document.querySelectorAll(".picker").forEach(p=>p.style.display="none");
}

/* فتح اختيار المصدر */
function openPicker(e,i){
  e.stopPropagation();
  hideAllPickers();
  document.getElementById("picker"+i).style.display="block";
}

function openFile(i,n){
  document.querySelectorAll("#box"+i+" input")[n].click();
  document.getElementById("picker"+i).style.display="none";
}

/* فتح الملاحظة */
function openEditor(e,i){
  e.stopPropagation();
  hideAllPickers();
  document.getElementById("editor"+i).style.display="flex";
  document.getElementById("note"+i).value = (dataStore[i] && dataStore[i].note) ? dataStore[i].note : "";
}

/* حفظ الملاحظة */
function saveNote(i){
  if(!dataStore[i]) dataStore[i] = {lat:"",lng:"",date:"",img:"",note:""};
  dataStore[i].note = document.getElementById("note"+i).value;
  saveStorage();
  document.getElementById("editor"+i).style.display = "none";
}

/* تحميل الصورة + الإحداثيات + التاريخ داخل الصورة */
function loadImg(i,input){
  const file = input.files && input.files[0];
  if(!file) return;

  hideAllPickers();

  const now = new Date();
  const dateText = now.toLocaleString("en-US");

  function renderWithOverlay(lat,lng){
    const reader = new FileReader();

    reader.onload = function(e){
      const img = new Image();

      img.onload = function(){
        const c = document.createElement("canvas");
        c.width = img.naturalWidth || img.width;
        c.height = img.naturalHeight || img.height;
        const ctx = c.getContext("2d");

        ctx.drawImage(img,0,0,c.width,c.height);

        const barHeight = Math.max(180, Math.round(c.height * 0.18));
        ctx.fillStyle = "rgba(0,0,0,.80)";
        ctx.fillRect(0, c.height - barHeight, c.width, barHeight);

        const fontBig = Math.max(44, Math.round(c.width * 0.038));
        const fontDate = Math.max(34, Math.round(c.width * 0.028));

        ctx.fillStyle = "#fff";
        ctx.font = "bold " + fontBig + "px Arial";
        ctx.fillText("LAT: " + lat, 25, c.height - barHeight + 55);
        ctx.fillText("LNG: " + lng, 25, c.height - barHeight + 115);

        ctx.font = "bold " + fontDate + "px Arial";
        ctx.fillText(dateText, 25, c.height - 25);

        const finalBase64 = c.toDataURL("image/jpeg", 0.95);

        if(!dataStore[i]) dataStore[i] = {};
        dataStore[i].lat = lat;
        dataStore[i].lng = lng;
        dataStore[i].date = dateText;
        dataStore[i].img = finalBase64;
        dataStore[i].note = dataStore[i].note || "";
        saveStorage();

        const box = document.getElementById("box"+i);
        box.querySelectorAll("img").forEach(x=>x.remove());

        const finalImg = document.createElement("img");
        finalImg.src = finalBase64;
        box.appendChild(finalImg);
      };

      img.src = e.target.result;
    };

    reader.readAsDataURL(file);
  }

  if(navigator.geolocation){
    navigator.geolocation.getCurrentPosition(
      function(pos){
        const lat = pos.coords.latitude.toFixed(6);
        const lng = pos.coords.longitude.toFixed(6);
        renderWithOverlay(lat,lng);
      },
      function(){
        renderWithOverlay("N/A","N/A");
      },
      { enableHighAccuracy:true, timeout:10000, maximumAge:0 }
    );
  }else{
    renderWithOverlay("N/A","N/A");
  }

  input.value = "";
}

/* عنوان PDF كصورة */
async function makeTitleImage(dd,mm,yyyy){
  const titleDiv = document.createElement("div");
  titleDiv.style.width = "180mm";
  titleDiv.style.padding = "6mm";
  titleDiv.style.margin = "0 auto";
  titleDiv.style.fontFamily = "Tahoma";
  titleDiv.style.fontSize = "20px";
  titleDiv.style.fontWeight = "bold";
  titleDiv.style.textAlign = "center";
  titleDiv.style.color = "#111";
  titleDiv.style.background = "linear-gradient(90deg,#f3f4f6,#e5ece8)";
  titleDiv.style.borderBottom = "2px solid #9ca3af";
  titleDiv.textContent = `تقرير الصور ليوم: ${dd} / ${mm} / ${yyyy}`;
  document.body.appendChild(titleDiv);

  const titleCanvas = await html2canvas(titleDiv,{scale:2,backgroundColor:"#fff"});
  const titleImg = titleCanvas.toDataURL("image/jpeg",0.95);
  document.body.removeChild(titleDiv);

  return titleImg;
}

/* إنشاء صورة الملاحظات */
async function makeNoteImage(text, widthMm, heightMm){
  const temp = document.createElement("div");
  temp.style.width = widthMm + "mm";
  temp.style.height = heightMm + "mm";
  temp.style.padding = "6mm";
  temp.style.fontFamily = "Tahoma";
  temp.style.fontSize = "14px";
  temp.style.lineHeight = "1.7";
  temp.style.whiteSpace = "pre-wrap";
  temp.style.wordBreak = "break-word";
  temp.style.boxSizing = "border-box";
  temp.style.background = "linear-gradient(135deg,#f1f1f1 0%,#e6efe9 55%,#dbe7e1 100%)";
  temp.textContent = text || "";
  document.body.appendChild(temp);

  const noteCanvas = await html2canvas(temp,{scale:2,backgroundColor:"#fff"});
  const noteImg = noteCanvas.toDataURL("image/jpeg",0.95);
  document.body.removeChild(temp);

  return noteImg;
}

/* طباعة PDF */
async function printPDF(){
  if(!selected.length){
    alert("لم يتم اختيار أي صورة");
    return;
  }

  /* إخفاء الأزرار أثناء التصدير */
  document.querySelectorAll(".add,.edit,.picker").forEach(e=>e.style.display="none");
  document.querySelectorAll(".img-box").forEach(b=>b.classList.remove("selected"));

  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF("p","mm","a4");

  const now = new Date();
  const dd = String(now.getDate()).padStart(2,"0");
  const mm = String(now.getMonth()+1).padStart(2,"0");
  const yyyy = now.getFullYear();

  const titleImg = await makeTitleImage(dd,mm,yyyy);

  function drawTitle(){
    pdf.addImage(titleImg,"JPEG",15,10,180,20);
  }

  drawTitle();

  const pageWidth = pdf.internal.pageSize.getWidth();
  const margin = 15;
  const gap = 8;

  const imgWidth = 65;
  const imgHeight = 55;

  const noteX = margin + imgWidth + gap;
  const noteWidth = pageWidth - noteX - 20;

  let y = 35;

  for(const i of selected){
    if(!dataStore[i] || !dataStore[i].img) continue;

    if(y + imgHeight > 280){
      pdf.addPage();
      drawTitle();
      y = 35;
    }

    const box = document.getElementById("box"+i);
    const imgCanvas = await html2canvas(box,{scale:2,backgroundColor:"#fff",useCORS:true});
    const imgData = imgCanvas.toDataURL("image/jpeg",0.95);
    pdf.roundedRect(margin,y,imgWidth,imgHeight,3,3);
    pdf.addImage(imgData,"JPEG",margin,y,imgWidth,imgHeight);

    const noteImg = await makeNoteImage(dataStore[i].note || "", noteWidth, imgHeight);
    pdf.roundedRect(noteX,y,noteWidth,imgHeight,3,3);
    pdf.addImage(noteImg,"JPEG",noteX,y,noteWidth,imgHeight);

    y += imgHeight + 12;
  }

  pdf.save(`تقرير_الصور_${dd}-${mm}-${yyyy}.pdf`);

  /* إعادة الأزرار */
  document.querySelectorAll(".add,.edit").forEach(e=>e.style.display="");
  selectMode = false;
}

/* تصدير Excel بصيغة HTML يفتح في Excel */
function exportExcel(){
  const rows = [];
  for(let i=1;i<=12;i++){
    if(dataStore[i] && dataStore[i].img){
      rows.push({
        lat: dataStore[i].lat || "",
        lng: dataStore[i].lng || "",
        date: dataStore[i].date || "",
        note: dataStore[i].note || "",
        img: dataStore[i].img || ""
      });
    }
  }

  if(!rows.length){
    alert("لا توجد بيانات محفوظة للتصدير");
    return;
  }

  let html = `
  <html>
  <head>
    <meta charset="UTF-8">
  </head>
  <body>
    <table border="1" style="border-collapse:collapse;font-family:Tahoma">
      <tr style="background:#d9ead3;font-weight:bold">
        <th>LAT</th>
        <th>LNG</th>
        <th>DATE</th>
        <th>NOTE</th>
        <th>IMAGE</th>
      </tr>
  `;

  rows.forEach(r=>{
    html += `
      <tr>
        <td>${escapeHtml(r.lat)}</td>
        <td>${escapeHtml(r.lng)}</td>
        <td>${escapeHtml(r.date)}</td>
        <td>${escapeHtml(r.note).replace(/\n/g,"<br>")}</td>
        <td><img src="${r.img}" style="width:140px;height:100px;object-fit:contain"></td>
      </tr>
    `;
  });

  html += `
    </table>
  </body>
  </html>
  `;

  const blob = new Blob(['\ufeff' + html], {type:'application/vnd.ms-excel'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "report.xls";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/* حماية HTML */
function escapeHtml(text){
  return String(text || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

/* إغلاق القوائم عند الضغط خارجها */
document.addEventListener("click", function(){
  hideAllPickers();
});
</script>

</body>
</html>
